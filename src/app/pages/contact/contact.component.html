<section class="section">
  <div class="container fade-in-up contact-container">
    <h4 class="section-subtitle">Let's Connect</h4>
    <h2 class="section-title">Book Your Visual Story</h2>
    <p class="contact-desc">We take on a limited number of commissions each year. Please provide your details below to check our availability.</p>
    
    <form class="contact-page-form form-premium" action="https://formsubmit.co/f3fee6647d58a5e2c5a1a5089b9c3780" method="POST">
      <input type="hidden" name="_subject" value="New Wedding Inquiry from Sb.visuals!">
      
      <div class="input-group">
        <input type="text" name="Name" required class="premium-input" placeholder=" ">
        <label class="premium-label">Full Name</label>
      </div>

      <div class="form-row-2">
        <div class="input-group">
          <input type="email" name="Email" required class="premium-input" placeholder=" ">
          <label class="premium-label">Email Address</label>
        </div>
        <div class="input-group">
          <input type="tel" name="Phone" required class="premium-input" placeholder=" ">
          <label class="premium-label">Phone Number</label>
        </div>
      </div>

      <div class="input-group">
        <input type="text" onfocus="(this.type='date')" onblur="(this.type='text')" name="Event Date" required class="premium-input" placeholder=" ">
        <label class="premium-label">Event Date</label>
      </div>
      
      <div class="input-group">
        <textarea name="Message" rows="3" required class="premium-input" placeholder=" "></textarea>
        <label class="premium-label">Tell us about your event...</label>
      </div>
      
      <button type="submit" class="btn-premium">Send Inquiry</button>
    </form>
  </div>
</section>
