<section class="section portfolio">
  <div class="container fade-in-up">
    <h4 class="section-subtitle">Our Signature Work</h4>
    <h2 class="section-title">Visual Narratives</h2>

    <!-- Filters -->
    <nav class="portfolio-filters">
      <ul>
        <li *ngFor="let cat of categories" 
            [class.active]="selectedCategory === cat"
            (click)="setCategory(cat)">
          {{ cat }}
        </li>
      </ul>
    </nav>

    <!-- Masonry Gallery -->
    <div class="masonry-wrapper" style="margin-top: 60px;">
      <div class="masonry-column-grid">
        <div class="masonry-item hover-zoom fade-in-up" 
             *ngFor="let item of filteredItems"
             (click)="openLightbox(item)">
          <div class="item-visual-wrapper">
            <img [src]="item.url" [alt]="item.title" loading="lazy">
            <div class="moment-badge" *ngIf="item.label">{{ item.label }}</div>
          </div>
          <div class="item-overlay">
            <div class="item-meta">
              <h3>{{ item.title }}</h3>
              <p>{{ item.category }} • Archive</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Pagination / Load More -->
    <div style="text-align: center; margin-top: 80px;">
      <button class="btn-primary">Load More Stories</button>
    </div>
  </div>
</section>

<!-- Lightbox Modal -->
<div class="lightbox" *ngIf="selectedImage" (click)="closeLightbox()">
  <div class="lightbox-content glass gold-glow" (click)="$event.stopPropagation()">
    <button class="close-btn" (click)="closeLightbox()">&times;</button>
    <div class="lightbox-img">
      <img [src]="selectedImage.url" [alt]="selectedImage.title">
    </div>
    <div class="lightbox-info">
      <div class="left">
        <h2>{{ selectedImage.title }}</h2>
        <p>{{ selectedImage.category }} | Cinematic Archive</p>
      </div>
      <div class="right" *ngIf="selectedImage.storyId">
        <button class="btn-primary" (click)="viewStory(selectedImage.storyId)">View Full Story</button>
      </div>
    </div>
  </div>
</div>
