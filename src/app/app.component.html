<!-- Header / Sticky Nav -->
<header class="header" [class.scrolled]="isScrolled">
  <div class="container header-content">
    <div class="logo">
      <a href="#">Sb.visuals</a>
    </div>
    <div class="hamburger" (click)="toggleMenu()" [class.active]="isMenuOpen">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <nav class="nav" [class.open]="isMenuOpen">
      <ul>
        <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()">Home</a></li>
        <li><a routerLink="/about" routerLinkActive="active" (click)="closeMenu()">About</a></li>
        <li><a routerLink="/portfolio" routerLinkActive="active" (click)="closeMenu()">Our Work</a></li>
        <li><a routerLink="/services" routerLinkActive="active" (click)="closeMenu()">Services</a></li>
        <li><a routerLink="/contact" routerLinkActive="active" (click)="closeMenu()">Contact</a></li>
      </ul>
    </nav>
  </div>
</header>

<main class="main-content">
  <router-outlet></router-outlet>
</main>

<!-- Footer / Contact -->
<footer class="footer section" id="contact">
  <div class="container cascade-footer">
    <div class="footer-brand">
      <h2>sb.visuals</h2>
      <p>Luxury Wedding Photography & Films</p>
    </div>
    <div class="footer-links">
      <h4>Inquiries</h4>
      <p>hello&#64;sbvisuals.com</p>
      <p>+91 98765 43210</p>
      <div class="socials">
        <a href="#">Instagram</a>
        <a href="#">Viper</a>
        <a href="#">WhatsApp</a>
      </div>
    </div>
    <div class="footer-form">
      <h4>Book Your Date</h4>
      <form action="https://formsubmit.co/f3fee6647d58a5e2c5a1a5089b9c3780" method="POST">
        <input type="text" name="Name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <input type="tel" name="phone" placeholder="Your Phone Number" required>
        <textarea name="Message" rows="3" placeholder="Tell us about your wedding..."></textarea>
        <button type="submit" class="btn-primary">Send Inquiry</button>
      </form>
    </div>
  </div>
  <div class="footer-bottom">
    <p>&copy; 2026 sb.visuals. All Rights Reserved.</p>
  </div>
</footer>
