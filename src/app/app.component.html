<!-- Header / Sticky Nav -->
<header class="header" [class.scrolled]="isScrolled">
  <div class="container header-content">
    <div class="logo">
      <a routerLink="/">SbVisuals</a>
    </div>
    
    <div class="hamburger" (click)="toggleMenu()" [class.active]="isMenuOpen">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <nav class="nav" [class.open]="isMenuOpen">
      <ul>
        <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()">Home</a></li>
        <li><a routerLink="/about" routerLinkActive="active" (click)="closeMenu()">About Us</a></li>
        <li><a routerLink="/portfolio" routerLinkActive="active" (click)="closeMenu()">Our Work</a></li>
        <li><a routerLink="/services" routerLinkActive="active" (click)="closeMenu()">Services</a></li>
        <li><a routerLink="/client-gallery" routerLinkActive="active" (click)="closeMenu()">Client Portal</a></li>
        <li><a routerLink="/contact" routerLinkActive="active" (click)="closeMenu()">Contact</a></li>
        <li class="theme-toggle-li">
          <button class="theme-toggle-btn" (click)="toggleTheme()" [title]="(isDarkMode$ | async) ? 'Switch to Light Mode' : 'Switch to Dark Mode'">
            <!-- Ultra-Minimal Sun (Dark Mode) -->
            <svg *ngIf="isDarkMode$ | async" viewBox="0 0 24 24" fill="none" class="theme-icon sun">
              <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.2"/>
              <path d="M12 2v1.5M12 20.5V22M2 12h1.5M22 12h-1.5M19.07 4.93l-1.06 1.06M6 18l-1.06 1.06M19.07 19.07l-1.06-1.06M6 6l-1.06-1.06" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
            <!-- Ultra-Minimal Moon (Light Mode) -->
            <svg *ngIf="!(isDarkMode$ | async)" viewBox="0 0 24 24" fill="none" class="theme-icon moon">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </li>
      </ul>
    </nav>
  </div>
</header>

<main class="main-content">
  <router-outlet></router-outlet>
</main>

<!-- Footer / Contact -->
<footer class="footer section" id="contact">
  <div class="container cascade-footer">
    <div class="footer-brand">
      <h2>SbVisuals</h2>
      <p>Luxury Wedding Photography & Films</p>
    </div>
    <div class="footer-links">
      <h4>Inquiries</h4>
      <p>hello&#64;SbVisuals.com</p>
      <p>+91 99099099099</p>
      <div class="socials">
        <a href="#">Instagram</a>
        <a href="#">Viper</a>
        <a href="#">WhatsApp</a>
      </div>
    </div>
    <div class="footer-form">
      <h4>Book Your Date</h4>
      <form action="https://formsubmit.co/f3fee6647d58a5e2c5a1a5089b9c3780" method="POST">
        <input type="text" name="Name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <input type="tel" name="phone" placeholder="Your Phone Number" required>
        <textarea name="Message" rows="3" placeholder="Tell us about your wedding..."></textarea>
        <button type="submit" class="btn-primary">Send Inquiry</button>
      </form>
    </div>
  </div>
  <div class="footer-bottom">
    <p>&copy; 2026 SbVisuals. All Rights Reserved.</p>
  </div>
</footer>
